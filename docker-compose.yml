services:
  db:
    image: postgres:16-alpine
    container_name: bilimbattle_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-bilimbattle}
      TZ: Asia/Tashkent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: bilimbattle_redis
    restart: always
    environment:
      - TZ=Asia/Tashkent
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  api:
    build:
      context: ./backend
    container_name: bilimbattle_api
    restart: on-failure:5
    stop_grace_period: 15s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-bilimbattle}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - WEBAPP_URL=https://${WEBAPP_DOMAIN}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - TZ=Asia/Tashkent
      - VIRTUAL_HOST=${API_DOMAIN}
      - VIRTUAL_PORT=3000
      - LETSENCRYPT_HOST=${API_DOMAIN}
      - LETSENCRYPT_EMAIL=${SSL_EMAIL}
    expose:
      - "3000"
    networks:
      - backend
      - proxy_network

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: https://${API_DOMAIN}/api
        VITE_SOCKET_URL: https://${API_DOMAIN}
        VITE_BOT_USERNAME: ${BOT_USERNAME}
        VITE_ADMIN_TELEGRAM_ID: ${ADMIN_TELEGRAM_ID}
    container_name: bilimbattle_frontend
    restart: on-failure:5
    environment:
      # Add ",www.${WEBAPP_DOMAIN}" to both VIRTUAL_HOST and LETSENCRYPT_HOST
      # below only if you've also pointed a www DNS record at this server -
      # acme-companion requests a cert for every host listed here, and an
      # unresolvable www host will make that request fail.
      - VIRTUAL_HOST=${WEBAPP_DOMAIN}
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=${WEBAPP_DOMAIN}
      - LETSENCRYPT_EMAIL=${SSL_EMAIL}
    expose:
      - "80"
    networks:
      - proxy_network

networks:
  backend:
  proxy_network:
    external: true

volumes:
  postgres_data:
  redis_data:
