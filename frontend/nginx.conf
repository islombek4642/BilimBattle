server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # index.html must always be revalidated - it's the one file whose name
    # never changes between deploys, and it's what points the client at the
    # current build's content-hashed asset filenames. Without this, some
    # clients (observed: desktop Telegram) can keep serving a stale
    # index.html from cache indefinitely, which references JS/CSS chunks
    # that no longer exist after a new deploy - "same server, but the phone
    # sees the update and the computer doesn't" is exactly this symptom.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Vite content-hashes every file under /assets (e.g. index-D7SzWu-v.js) -
    # the hash changes whenever the file's content changes, so these are
    # safe to cache aggressively and immutably. A new deploy always produces
    # new filenames here, it never overwrites an old one.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
